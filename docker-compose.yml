version: '3.9'

name: diplom2

x-spark-base: &spark-base
  build: ./services/spark/
  stdin_open: true
  tty: true

x-airflow-base: &airflow-base
  build: ./services/airflow/
  environment:
    - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://mlflow:mlflow@postgres:5432/airflowdb
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__API__SECRET_KEY=my_super_secret_key_change_me
  volumes:
    - ./services/airflow/dags/:/opt/airflow/dags
    - ./services/airflow/logs/:/opt/airflow/logs
    - /var/run/docker.sock:/var/run/docker.sock

services:
  postgres:
    container_name: postgres
    image: postgres:16
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflowdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflowdb"]
      interval: 20s
      timeout: 5s
      retries: 100 
      start_period: 20s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 100
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  minio:
    container_name: minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/bitnami/minio/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 20s
      timeout: 10s
      retries: 100
      start_period: 10s

  mlflow:
    container_name: mlflow-server
    build: ./services/mlflow/
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    volumes:
      - ./services/mlflow/app/:/app/
    command: >
      bash -c "
      mlflow server
      --backend-store-uri postgresql+psycopg2://mlflow:mlflow@postgres:5432/mlflowdb
      --default-artifact-root s3://mlflow-artifacts
      --host 0.0.0.0
      --port 5000
      "

  airflow-init:
    <<: *airflow-base
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    restart: "no"

  airflow-webserver:
    <<: *airflow-base
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    command: airflow webserver

  airflow-scheduler:
    <<: *airflow-base
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow scheduler

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    ports:
      - "3000:3000"

  spark-master:
    <<: *spark-base
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
    ports:
      - "7077:7077"
      - "8085:8080"
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master
      --port 7077
      --webui-port 8080

  spark-worker:
    <<: *spark-base
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER=spark://spark-master:7077
    ports:
      - "8086:8081"
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077

  spark-streaming:
    <<: *spark-base
    container_name: spark-streaming
    depends_on:
      spark-master:
        condition: service_started
      kafka:
        condition: service_healthy
      minio:
          condition: service_healthy
    command: >
      /opt/spark/bin/spark-submit
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.2
      --master spark://spark-master:7077
      --total-executor-cores 2
      --executor-cores 1
      --executor-memory 2g
      /app/structured_streaming.py
    restart: always

  # spark-etl:
  #   <<: *spark-base
  #   container_name: spark-etl
  #   depends_on:
  #     - spark-master
  #     - minio
  #   command: >
  #     /opt/spark/bin/spark-submit
  #     --master spark://spark-master:7077
  #     --total-executor-cores 1
  #     --executor-cores 1
  #     --executor-memory 2g
  #     /app/ETL/etl.py
  #   restart: "no"

  # spark-tolocal:
  #   <<: *spark-base
  #   container_name: spark-tolocal
  #   depends_on:
  #     - spark-master
  #     - minio
  #   command: >
  #     /opt/spark/bin/spark-submit
  #     --master spark://spark-master:7077
  #     --total-executor-cores 1
  #     --executor-cores 1
  #     --executor-memory 1g
  #     /app/ETL/to_local.py
  #   volumes:
  #     - ./services/spark/app/:/app/
  #     - ./filtered_photos:/data/filtered_photos
  #   restart: "no"

  producer:
    container_name: kafka-producer
    build: ./services/producer
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/data/photos
      - ./services/producer/app/:/app/
    command: python /app/producer.py
    restart: always

  
volumes:
  postgres_data:
  minio_data:
